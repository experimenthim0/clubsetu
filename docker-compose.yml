version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: clubsetu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clubsetu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: himanshu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clubsetu-network

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: clubsetu-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:himanshu@db:5432/clubsetu
    env_file:
      - ./server/.env
    command: sh -c "npx prisma migrate deploy && node index.js"
    ports:
      - "5000:5000"
    networks:
      - clubsetu-network

volumes:
  postgres_data:

networks:
  clubsetu-network:
    driver: bridge